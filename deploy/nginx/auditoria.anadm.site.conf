# Redireciona HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name auditoria.anadm.site;
    return 301 https://$host$request_uri;
}

# Bloco HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auditoria.anadm.site;

    ssl_certificate     /etc/letsencrypt/live/auditoria.anadm.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auditoria.anadm.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Permite upload de relatórios maiores (CSV/HTML/PDF)
    client_max_body_size 200M;

    location / {
        proxy_pass http://127.0.0.1:8502;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Evita quedas de conexão em uploads/processamentos longos
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 60;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
